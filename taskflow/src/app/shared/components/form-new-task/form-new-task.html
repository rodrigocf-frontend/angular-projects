@if (visible()) {
  <div class="overlay" (click)="closeNewTaskForm()">
    <form [formGroup]="formNewTask" class="modal font-inter" (click)="$event.stopPropagation()">
      <div class="modal-head">
        <span class="modal-title">
          @if (!edittingTask()) {
            Nova tarefa
          } @else {
            Editar tarefa
          }
        </span>
        <button class="modal-close" (click)="closeNewTaskForm()">
          <i name="close"></i>
        </button>
      </div>

      <div class="modal-body">
        <div class="field">
          <label class="label">Título <span class="req">*</span></label>
          <input formControlName="title" class="input" maxlength="80" />
          <div class="field-footer">
            <span></span>
            <span class="char-count">{{ formValues()?.title?.length ?? 0 }}/80</span>
          </div>
        </div>

        <div class="field">
          <label class="label">Descrição</label>
          <textarea formControlName="description" class="input textarea"></textarea>
          <div class="field-footer">
            <span></span>
            <span class="char-count">{{ formValues()?.description?.length ?? 0 }}/300</span>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label class="label">Prioridade <span class="req">*</span></label>
            <div class="select-group">
              @for (item of priorities; track item.label) {
                <button
                  type="button"
                  class="select-btn"
                  [class]="{
                    selected: formValues()?.priority === item.value,
                    'select-btn--low': item.value === 'low',
                    'select-btn--med': item.value === 'med',
                    'select-btn--high': item.value === 'high',
                  }"
                  (click)="onSelectPriority(item.value)"
                >
                  {{ item.label }}
                </button>
              }
            </div>
          </div>

          <div class="field">
            <label class="label">Status <span class="req">*</span></label>
            <select formControlName="status" class="input select">
              @for (item of status; track item.label) {
                <option [value]="item.value" [selected]="formValues()?.status === item.value">
                  {{ item.label }}
                </option>
              }
            </select>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label class="label">Tag</label>
            <select formControlName="tag" class="input select">
              @for (item of tags; track item.label) {
                <option [value]="item.value" [selected]="formValues()?.tag === item.value">
                  {{ item.label }}
                </option>
              }
            </select>
          </div>

          <div class="field">
            <label class="label">Prazo</label>
            <input formControlName="dueDate" class="input" type="date" />
          </div>
        </div>
      </div>

      <div class="modal-foot">
        <button (click)="closeNewTaskForm()" ghost>Cancelar</button>
        <button primary (click)="submitNewTask()">
          @if (!edittingTask()) {
            <i name="add"></i>Criar tarefa
          } @else {
            Atualizar
          }
        </button>
      </div>
    </form>
  </div>
}
