@if (visible()) {
  <div class="overlay font-inter" (click)="closeNewProjectForm()">
    <form [formGroup]="formGroup" class="modal" (click)="$event.stopPropagation()">
      <div class="modal-head">
        <span class="modal-title">Novo projeto</span>
        <button class="modal-close" (click)="closeNewProjectForm()"><i class="ti ti-x"></i></button>
      </div>

      <div class="modal-body">
        <div class="field">
          <label class="label">Nome do projeto <span class="req">*</span></label>
          <input
            formControlName="name"
            class="input"
            placeholder="Ex: API Backend"
            [maxlength]="40"
          />
          <span class="char-count">{{ nameLength() }}/40</span>
        </div>

        <div class="field">
          <label class="label">Descrição</label>
          <textarea
            formControlName="description"
            class="input textarea"
            placeholder="Do que se trata esse projeto?"
          ></textarea>
          <span class="hint">Opcional — ajuda a dar contexto pra equipe</span>
        </div>

        <div class="field">
          <label class="label">Cor de identificação <span class="req">*</span></label>
          <div class="color-picker">
            @for (color of projectColors; track color.hex) {
              <div
                class="color-dot"
                [ngClass]="{ selected: selectedColor() === color.hex }"
                (click)="clickColor(color.hex)"
                [style.backgroundColor]="color.hex"
                [title]="color.name"
              >
                @if (selectedColor() === color.hex) {
                  <i name="check"></i>
                }
              </div>
            }
          </div>
        </div>

        <div class="field">
          <label class="label">Prazo estimado</label>
          <input formControlName="deadline" class="input" type="date" />
        </div>
      </div>

      <div class="modal-foot">
        <button class="btn btn-ghost" (click)="closeNewProjectForm()">Cancelar</button>
        <button [disabled]="formGroup.invalid" class="btn btn-primary" (click)="submitNewProject()">
          <i class="ti ti-plus"></i>Criar projeto
        </button>
      </div>
    </form>
  </div>
}
