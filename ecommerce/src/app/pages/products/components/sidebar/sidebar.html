<aside class="sidebar">
  @if (categories$ | async; as filters) {
    <div class="filter-group">
      <div class="filter-title">Categoria</div>
      <div class="filter-options">
        @for (item of filters.categories; track $index) {
          <div class="filter-option" (click)="handleFilter(item)">
            <div class="filter-option-left">
              <div class="filter-checkbox" [class.checked]="item.checked"></div>
              <span class="filter-label">{{ item.name }}</span>
            </div>
            <span class="filter-count">{{ item.count }}</span>
          </div>
        }
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-title">Tamanho</div>
      <div class="size-options">
        @for (item of filters.sizes; track $index) {
          <div class="size-option" [class.selected]="item.checked" (click)="handleFilter(item)">
            {{ item.name }}
          </div>
        }
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-title">Cor</div>
      <div class="color-options">
        @for (item of filters.colors; track $index) {
          <div
            class="color-option"
            [class.selected]="item.checked"
            [style.background]="item.hex"
            [title]="item.name"
            (click)="handleFilter(item)"
          ></div>
        }
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-title">Faixa de preço</div>
      <div class="price-inputs">
        <input class="price-input" type="text" value="R$ 200" />
        <span class="price-sep">—</span>
        <input class="price-input" type="text" value="R$ 1.500" />
      </div>
    </div>

    <button class="filter-clear" (click)="clearFilter()">Limpar filtros</button>
  }
</aside>
