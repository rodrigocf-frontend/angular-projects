<app-breadcrumb />
<div class="page">
  <app-sidebar />
  <main class="main">
    <div class="main-header">
      <h1 class="main-title">Coleções <em>SS26</em></h1>
      <div class="main-meta">
        <span class="results-count">48 peças</span>
        <select class="sort-select">
          <option>Relevância</option>
          <option>Menor preço</option>
          <option>Maior preço</option>
          <option>Novidades</option>
        </select>
      </div>
    </div>
    <div class="active-filters">
      @if (filtersActives$ | async; as actives) {
        @for (item of actives; track $index) {
          <div class="active-filter">
            {{ item.name }} <button (click)="handleFilter(item)">×</button>
          </div>
        }
        @if (actives.length > 0) {
          <button class="clear-all" (click)="clearFilter()">Limpar tudo</button>
        }
      }
    </div>
    <app-products-list />
    <app-pagination />
  </main>
</div>
